services:
  - type: web
    name: newstockandcrypto
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: MODEL_EXPLORER_SCHEME
        value: "https"
      - key: MODEL_EXPLORER_HOST
        value: "newstockandcrypto-ml.onrender.com"
      - key: MODEL_EXPLORER_PORT
        value: "443"

  - type: web
    name: newstockandcrypto-ml
    env: python
    region: oregon
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: MODEL_EXPLORER_MODE
        value: "live"
